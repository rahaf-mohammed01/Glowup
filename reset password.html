<html>

<head>
    <title>Reset password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>

    <!-- Define custom styles for the body -->
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, #875c459f, 10%, #875c459f);
            margin: 0;
        }

        /* Customize the login form card */
        .card.login-form {
            max-width: 1000px;
            max-height: 800px;
        }

        /* Set padding for the card body */
        .card-body {
            padding: 6rem;
        }

        /* Customize the card title color */
        .card-title {
            color: #010101;
        }

        /* Add margin to form groups */
        .form-group {
            margin-bottom: 2rem;
        }

        /* Customize the primary button styles */
        .btn-primary {
            background-color: #161616;
            border-color: #171818;
        }

        /* Customize the primary button styles on hover */
        .btn-primary:hover {
            background-color: #070808;
            border-color: #020202;
        }
    </style>

    <!-- Create a card for the login form using Bootstrap -->
    <div class="card login-form">
        <div class="card-body">
            <!-- Set the card title -->
            <h3 class="card-title text-center">Reset password</h3>

            <div class="card-text">
                <!-- Create a form with an email input and a submit button -->
                <form>
                    <div class="form-group">
                        <label for="exampleInputEmail1">Enter your email address and we will send you a link to
                            reset your password.</label>
                        <input type="email" class="form-control form-control-sm mt-2"
                            placeholder="Enter your email address">
                    </div>

                    <!-- Add a button to submit the form -->
                    <button type="submit" class="btn btn-primary btn-block">Send password reset email</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Add a script to handle form submission and email validation -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {

            // Select the form element
            var form = document.querySelector('form');

            // Add an event listener for form submission
            form.addEventListener('submit', function (event) {
                event.preventDefault();

                // Get the value of the email input
                var emailInput = document.querySelector('input[type="email"]');
                var email = emailInput.value;

                // Validate the email format using a regular expression
                if (!isValidEmail(email)) {
                    alert('Please enter a valid email address.');
                    return;
                }

                // Display a success message if the email is valid
                alert('Password reset email sent successfully!');
            });

            // Function to validate email using a regular expression
            function isValidEmail(email) {
                var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
        });

    </script>
</body>

</html>
